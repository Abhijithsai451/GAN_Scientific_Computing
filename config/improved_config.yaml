project_name: GAN_Improved_MODEL
dataset:
  name: CIFAR10
  classes: [plane, car, bird, cat, deer, dog, frog, horse, ship, truck]
data:
  root: ./data
  download: true
  num_workers: 8
data_transform:
  tin_mean: [0.5, 0.5, 0.5]
  tin_std: [0.5, 0.5, 0.5]
  aug_images: 1
logger:
  log_dir: results/improved/logs
  tensorboard_dir: results/improved/runs
  ckpt_dir: results/improved/checkpoints
  use_tensorboard: true
  save_every: 10
  log_file: training_improved.log
  level: INFO
model:
  latent_dim: 1000
  num_classes: 10
  embedding_dim: 200
  generator_channels: [1024, 512, 256, 128, 64]
  discriminator_channels: [64, 128, 256, 512, 1024]
  leaky_slope: 0.2
trainer:
  batch_size: 64
  epochs: 100
  lr_g: 0.001
  lr_d: 0.001
  beta1: 0.5
  beta2: 0.999
device: mps
use_pin: false
seed: 42
