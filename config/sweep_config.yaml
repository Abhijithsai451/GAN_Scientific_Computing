name: "GAN Hyperparameter Tuning"
method: grid
metric:
  name: train/loss_g
  goal: minimize
parameters:
  lr:
    values: [0.0001, 0.0002, 0.001]
  latent_dim:
    values: [100, 500, 1000]
  embedding_dim:
    values: [50, 200]
  architecture:
    values: [shallow, standard, deep]
  batch_size:
    values: [64, 128]
  epochs:
    value: 3